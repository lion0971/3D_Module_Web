<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Succuleaf 數位分身 - 模組化版</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="loading-screen">
    <!-- <video id="loading-video" autoplay loop muted playsinline>
      <source src="./images/intro.mp4" type="video/mp4">
      您的瀏覽器不支援影片標籤。
    </video> -->

    <div class="loader-container">
      <div class="leaf-icon">🌿</div>
      <div class="progress-wrapper">
        <div id="loader-bar"></div>
      </div>
      <div id="loader-text">正在組裝...</div>
    </div>
    <div id="instructions">
      <div id="desktop-instructions" style="display: none;">
        <h3>💻 電腦極致體驗</h3>
        <ul>
          <li><strong>入厝儀式</strong> ｜ 載入完成後，點擊畫面優雅開門。</li>
          <li><strong>空間漫步</strong> ｜ 鍵盤 W A S D 自由穿梭，擺動滑鼠環顧四周。</li>
          <li><strong>科技透視</strong> ｜ 連點滑鼠兩下，切換至 X-Ray 管路模式。</li>
        </ul>
      </div>
      <div id="mobile-instructions" style="display: none;">
        <h3>📱 手機隨身跨界</h3>
        <ul>
          <li><strong>觸控視角</strong> ｜ 單指滑動環顧四周。</li>
          <li><strong>空間行走</strong> ｜ 按住螢幕不放持續前進。</li>
          <li><strong>智能微控</strong> ｜ 單指點擊裝置，隨心開關水流。</li>
          <li><strong>透視選單</strong> ｜ 單指雙擊螢幕，喚醒核心功能選單。</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="crosshair"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      document.getElementById("desktop-instructions").style.display = isMobile ? "none" : "block";
      document.getElementById("mobile-instructions").style.display = isMobile ? "block" : "none";
    });
  </script>


  <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/DRACOLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/loaders/EXRLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/EXRLoader.js",
            "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
            "three/examples/jsm/renderers/CSS2DRenderer": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js",
            "three/examples/jsm/postprocessing/EffectComposer.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
            "three/examples/jsm/postprocessing/RenderPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
            "three/examples/jsm/postprocessing/UnrealBloomPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js",
            "three/examples/jsm/lights/RectAreaLightUniformsLib.js": "https://unpkg.com/three@0.160.0/examples/jsm/lights/RectAreaLightUniformsLib.js"
        }
    }
  </script>

  <script type="module" src="./main.js"></script>
</body>

</html>
